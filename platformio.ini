; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html
;
; โปรเจกต์นี้ = ESP32 classic เท่านั้น (OldBoard 0/1 ใช้ env เดียวกัน)
; ESP32-S3 touch → โปรเจกต์ ATD35_Melody_V3 (OTA ai_touch)

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_flags = -w -DCONFIG_ESP_TASK_WDT_TIMEOUT_S=30 -DMQTT_SOCKET_TIMEOUT=15
